---
- name: Deploy Docker Projects and Node Exporter to EC2
  hosts: web_nodes
  become: yes
  vars:
    docker_username: "praveen0031"
    ansible_python_interpreter: /usr/bin/python3

  tasks:
    - name: Install Docker and Dependencies
      yum:
        name: 
          - docker
        state: present

    - name: Start and Enable Docker Service
      service:
        name: docker
        state: started
        enabled: yes

    - name: Ensure ec2-user is in docker group
      user:
        name: ec2-user
        groups: docker
        append: yes

    - name: Run Node Exporter for Prometheus Metrics
      shell: |
        docker stop node-exporter || true
        docker rm node-exporter || true
        docker run -d \
          --name node-exporter \
          --restart always \
          --net="host" \
          --pid="host" \
          -v "/:/host:ro,rslave" \
          prom/node-exporter:latest \
          --path.rootfs=/host
      # Note: Port 9100 is exposed via --net="host" automatically

    # --- NODE 1 PROJECTS ---
    - name: Deploy Pro1 and Pro2 to Node 1
      when: inventory_hostname == groups['web_nodes'][0]
      shell: |
        docker pull {{ docker_username }}/{{ item.name }}:latest
        docker stop {{ item.name }}-container || true
        docker rm {{ item.name }}-container || true
        docker run -d --name {{ item.name }}-container --restart always -p {{ item.port }}:80 {{ docker_username }}/{{ item.name }}:latest
      loop:
        - { name: "pro1", port: "8081" }
        - { name: "pro2", port: "8082" }

    # --- NODE 2 PROJECTS ---
    - name: Deploy Pro3 and Pro4 to Node 2
      when: inventory_hostname == groups['web_nodes'][1]
      shell: |
        docker pull {{ docker_username }}/{{ item.name }}:latest
        docker stop {{ item.name }}-container || true
        docker rm {{ item.name }}-container || true
        docker run -d --name {{ item.name }}-container --restart always -p {{ item.port }}:80 {{ docker_username }}/{{ item.name }}:latest
      loop:
        - { name: "pro3", port: "8083" }
        - { name: "pro4", port: "8084" }