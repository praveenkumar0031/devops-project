---
- name: Deploy Docker Projects to EC2
  hosts: web_nodes
  become: yes
  vars:
    # Matches the DOCKER_USER from your Jenkins environment
    docker_username: "praveen0031"
    ansible_python_interpreter: /usr/bin/python3
    projects:
      - { name: "pro1", port: "8081" }
      - { name: "pro2", port: "8082" }
      - { name: "pro3", port: "8083" }
      - { name: "pro4", port: "8084" }

  tasks:
    - name: Install Docker and Dependencies
      yum:
        name: 
          - docker
          - python3-pip
        state: present

    - name: Install Docker SDK for Python
      pip:
        name: docker
        executable: pip3
        extra_args: --ignore-installed

    - name: Start and Enable Docker Service
      service:
        name: docker
        state: started
        enabled: yes

    - name: Ensure ec2-user is in docker group
      user:
        name: ec2-user
        groups: docker
        append: yes

    - name: Pull and Run All Project Containers (Direct Command)
      shell: |
        docker pull {{ docker_username }}/{{ item.name }}:latest
        docker stop {{ item.name }}-container || true
        docker rm {{ item.name }}-container || true
        docker run -d \
          --name {{ item.name }}-container \
          --restart always \
          -p {{ item.port }}:80 \
          {{ docker_username }}/{{ item.name }}:latest
      loop: "{{ projects }}"