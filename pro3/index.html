<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROOT_TERMINAL_v4</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1 id="terminal-header">[ SYSTEM_OPERATOR ]</h1>

    <div id="menu">
        <button onclick="show('memory')">💾 DECRYPT_DATA</button>
        <button onclick="show('query')">📟 QUERY_BOT</button>
        <button onclick="show('cicd')">🚀 CI/CD_DEPLOY</button>
    </div>

    <div id="memory" class="section">
        <h2>PROTOCOL: MEMORY_RECOVERY</h2>
        <p>ATTEMPTS: <span id="moves">0</span></p>
        <button onclick="startMemory()">INIT_DECRYPT</button>
        <div id="memoryGrid"></div>
    </div>

    <div id="query" class="section">
        <h2>PROTOCOL: PATTERN_ISO</h2>
        <div class="hack-header">
            <p>TARGET: <span id="targetWord">----</span></p>
            <p>TIME: <span id="hackTimer">20</span>s</p>
        </div>
        <div id="wordGrid"></div>
        <button onclick="startQueryBot()">START_SCAN</button>
    </div>

    <div id="cicd" class="section">
        <h2>PROTOCOL: PIPELINE_STABILIZER</h2>
        <div id="pipeline-status">STDBY</div>
        <p>SUCCESSFUL DEPLOYS: <span id="deployCount">0</span>/5</p>
        <div id="build-indicator"></div>
        <button id="deployBtn" onclick="attemptDeploy()">DEPLOY_TO_PROD</button>
        <p class="hint">CLICK 'DEPLOY' ONLY WHEN STATUS IS SUCCESS (GREEN)</p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
