<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Login</title>

    <style>
        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            overflow: hidden;
        }

        /* Animated background circles */
        .bg span {
            position: absolute;
            display: block;
            width: 20px;
            height: 20px;
            background: rgba(255,255,255,0.2);
            animation: move 20s linear infinite;
            bottom: -150px;
            border-radius: 50%;
        }

        .bg span:nth-child(1) { left: 10%; animation-duration: 15s; }
        .bg span:nth-child(2) { left: 20%; animation-duration: 12s; }
        .bg span:nth-child(3) { left: 30%; animation-duration: 18s; }
        .bg span:nth-child(4) { left: 40%; animation-duration: 10s; }
        .bg span:nth-child(5) { left: 50%; animation-duration: 14s; }
        .bg span:nth-child(6) { left: 60%; animation-duration: 20s; }
        .bg span:nth-child(7) { left: 70%; animation-duration: 11s; }
        .bg span:nth-child(8) { left: 80%; animation-duration: 16s; }

        @keyframes move {
            0% {
                transform: translateY(0);
                opacity: 1;
            }
            100% {
                transform: translateY(-1000px);
                opacity: 0;
            }
        }

        /* Login Card */
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            width: 90%;
            max-width: 350px;
            color: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        h1 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border: none;
            border-radius: 8px;
            outline: none;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #ff9800;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #e68900;
        }

        /* Responsive */
        @media (max-width: 500px) {
            .container {
                padding: 25px;
            }
        }
    </style>
</head>

<body>

    <!-- Background animation -->
    <div class="bg">
        <span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span>
    </div>

    <!-- Login UI -->
    <div class="container">
        <h1>🎮 Game Start</h1>
        <input type="text" id="username" placeholder="Enter your username">
        <button onclick="startGame()">Start Game</button>
    </div>

    <script>
        function startGame() {
            const username = document.getElementById("username").value;

            if (username.trim() === "") {
                alert("Please enter your username");
                return;
            }

            alert("Welcome " + username + "! Starting game...");
            
             window.location.href = "index.html";
        }
    </script>

</body>
</html>
