<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ping Pong Game</title>

<style>
body {
    margin: 0;
    text-align: center;
    background: radial-gradient(circle, #0f2027, #203a43, #2c5364);
    color: white;
    font-family: Arial;
}

canvas {
    display: block;
    margin: auto;
    background: black;
    border-radius: 10px;
    box-shadow: 0 0 25px cyan;
}

button {
    margin: 5px;
    padding: 10px;
    border: none;
    border-radius: 6px;
    background: #00c6ff;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<h2>🎮 Ping Pong Game</h2>

<div>
    <button id="startBtn" onclick="startGame()">Start</button>
    <button id="pauseBtn" onclick="pauseGame()" style="display:none;">Pause</button>
    <button id="resumeBtn" onclick="resumeGame()" style="display:none;">Resume</button>

    <p id="score">Score: 0</p>
    <p id="lives">Lives: ❤️❤️❤️</p>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let mode = localStorage.getItem("mode") || "vertical";

canvas.width = window.innerWidth * 0.6;
canvas.height = window.innerHeight * 0.7;

let paddle, bot, ball;
let running = false, paused = false;
let score = 0;
let lives = 3;

const startBtn = document.getElementById("startBtn");
const pauseBtn = document.getElementById("pauseBtn");
const resumeBtn = document.getElementById("resumeBtn");

// Init
function init() {
    if (mode === "vertical") {
        paddle = { x: canvas.width/2-60, y: canvas.height-20, w:120, h:10 };
        bot = { x: canvas.width/2-60, y:10, w:120, h:10 };
    } else {
        paddle = { x: canvas.width-20, y: canvas.height/2-60, w:10, h:120 };
        bot = { x: 10, y: canvas.height/2-60, w:10, h:120 };
    }

    resetBall();
}

// Reset Ball (used for revive)
function resetBall() {
    ball = {
        x: canvas.width/2,
        y: canvas.height/2,
        dx: 2,
        dy: 2,
        r: 8
    };
}

// Draw
function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="cyan";
    ctx.fillRect(paddle.x,paddle.y,paddle.w,paddle.h);

    ctx.fillStyle="orange";
    ctx.fillRect(bot.x,bot.y,bot.w,bot.h);

    ctx.beginPath();
    ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);
    ctx.fillStyle="red";
    ctx.fill();
}

// Bot AI
function moveBot() {
    if (mode === "vertical") {
        bot.x += (ball.x - bot.x - bot.w/2) * 0.05;
    } else {
        bot.y += (ball.y - bot.y - bot.h/2) * 0.05;
    }
}

// Update lives UI
function updateLives() {
    document.getElementById("lives").innerText = 
        "Lives: " + "❤️".repeat(lives);
}

// Loop
function loop() {
    if (!running || paused) return;

    moveBot();

    ball.x += ball.dx;
    ball.y += ball.dy;

    if (ball.x < 0 || ball.x > canvas.width) ball.dx *= -1;
    if (ball.y < 0) ball.dy *= -1;

    if (mode === "vertical") {

        // MISS → lose life
        if (ball.y > canvas.height) {
            lives--;
            updateLives();

            if (lives === 0) {
                endGame();
                return;
            }

            resetBall(); // revive
        }

        // Player hit
        if (ball.y > paddle.y &&
            ball.x > paddle.x &&
            ball.x < paddle.x + paddle.w) {
            ball.dy *= -1;
            score++;
        }

        // Bot hit
        if (ball.y < bot.y + bot.h &&
            ball.x > bot.x &&
            ball.x < bot.x + bot.w) {
            ball.dy *= -1;
        }

    } else {

        if (ball.x > canvas.width) {
            lives--;
            updateLives();

            if (lives === 0) {
                endGame();
                return;
            }

            resetBall();
        }

        if (ball.x > paddle.x &&
            ball.y > paddle.y &&
            ball.y < paddle.y + paddle.h) {
            ball.dx *= -1;
            score++;
        }

        if (ball.x < bot.x + bot.w &&
            ball.y > bot.y &&
            ball.y < bot.y + bot.h) {
            ball.dx *= -1;
        }
    }

    draw();
    document.getElementById("score").innerText = "Score: " + score;

    requestAnimationFrame(loop);
}

// Controls
canvas.addEventListener("mousemove", e=>{
    const rect = canvas.getBoundingClientRect();
    if (mode === "vertical")
        paddle.x = e.clientX - rect.left - paddle.w/2;
    else
        paddle.y = e.clientY - rect.top - paddle.h/2;
});

// Buttons
function startGame(){
    score = 0;
    lives = 3;
    updateLives();

    init();
    running = true;
    paused = false;

    startBtn.style.display = "none";
    pauseBtn.style.display = "inline-block";
    resumeBtn.style.display = "none";

    loop();
}

function pauseGame(){
    paused = true;
    pauseBtn.style.display = "none";
    resumeBtn.style.display = "inline-block";
}

function resumeGame(){
    paused = false;
    resumeBtn.style.display = "none";
    pauseBtn.style.display = "inline-block";
    loop();
}

function endGame(){
    running = false;
    alert("Game Over! Score: " + score);

    startBtn.style.display = "inline-block";
    pauseBtn.style.display = "none";
    resumeBtn.style.display = "none";
}

// Enter key
document.addEventListener("keydown", e=>{
    if(e.key==="Enter") startGame();
});
</script>

</body>
</html>
